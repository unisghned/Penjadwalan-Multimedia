<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia - Guest View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-[#0b1426] text-white font-sans overflow-x-hidden">

    <nav class="bg-[#162238]/80 backdrop-blur-md border-b border-slate-800 p-5 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter uppercase">🎥 <span class="text-cyan-500">Multimedia</span></h1>
            <a href="admin.html" class="text-[10px] font-black bg-cyan-600 px-5 py-2 rounded-full hover:bg-cyan-500 transition-all">ADMIN LOGIN</a>
        </div>
    </nav>

    <div class="container mx-auto p-6 max-w-4xl">
        <header class="text-center my-10 animate__animated animate__fadeIn">
            <h2 class="text-4xl font-black tracking-tight mb-2">JADWAL PETUGAS</h2>
            <div id="realtime-clock" class="text-cyan-500 font-mono font-bold text-sm"></div>
        </header>

        <div class="flex justify-center gap-3 mb-10">
            <button onclick="setGuestFilter('Biasa')" id="f-biasa" class="filter-btn active">BIASA</button>
            <button onclick="setGuestFilter('Besar')" id="f-besar" class="filter-btn">BESAR</button>
        </div>

        <div id="guest-schedule-list" class="space-y-6">
            </div>
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
